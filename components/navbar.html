<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feelio - Navbar</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/navbar.css">
    <script src="https://unpkg.com/feather-icons"></script>
</head>
<body>
  <nav class="navbar">
    <div class="logo">
      <img src="../assets/images/logo-feelio.png" alt="Feelio Icon" class="logo-img">
      <span>Feelio</span>
    </div>

    <nav class="nav-links">
      <a href="home.html">Home</a>
      <a href="daily-light.html">Daily Light</a>
      <a href="rituals.html">Rituals</a>
      <a href="caremap.html">Care Map</a>
      <a href="journal.html">Insight</a>
    </nav>

    <div class="nav-right">
      <div class="notification-container">
        <div class="notification-icon" id="notifTrigger">
          <i data-feather="bell"></i>
          <span class="badge"></span> 
        </div>
        
        <div class="notif-dropdown" id="notifDropdown">
          <div class="notif-header">
            <h3>Notifications</h3>
            <button class="mark-read">Mark all as read</button>
          </div>
          <div class="notif-content">
            <div class="notif-item unread">
              <div class="notif-dot"></div>
              <p>Welcome to Feelio! Start your journey today ✨</p>
              <span>2 mins ago</span>
            </div>
            <div class="notif-item">
              <p>Don't forget to check your daily mood!</p>
              <span>1 hour ago</span>
            </div>
          </div>
        </div>
      </div>

      <div class="profile-dropdown">
        <div class="profile-bubble" id="profileTrigger">
          <img src="../assets/images/mascot-calm.png" alt="profile" class="mascot-img calm">
          <img src="../assets/images/mascot-happy.png" alt="profile" class="mascot-img happy">
        </div>
      
        <div class="dropdown-menu" id="dropdownMenu"></div>

        <div id="registerHint" class="hint-outside">START HERE!</div>
      </div>

      <div class="hamburger">
        <i data-feather="menu"></i>
      </div>
    </div>
  </nav>

  <div class="auth-modal-overlay" id="authModal">
    <div class="modal-content">
      <button class="close-modal" id="closeModal">&times;</button>
      <div id="modalFormContainer"></div>
    </div>
  </div>

  <div class="auth-modal-overlay" id="profileModal">
    <div class="modal-content profile-modal">
        <button class="close-modal" onclick="closeModal('profileModal')">&times;</button>
        <div class="profile-header">
            <div class="profile-avatar-large">
                <img src="../assets/images/mascot-happy.png" alt="Avatar">
            </div>
            <h2 id="displayProfileName">User Name</h2>
            <p id="displayProfileEmail">user@email.com</p>
        </div>
        <div class="profile-stats">
            <div class="stat-item"><h4>12</h4><p>Rituals</p></div>
            <div class="stat-item"><h4>5</h4><p>Badges</p></div>
        </div>
    </div>
</div>

<div class="auth-modal-overlay" id="settingsModal">
    <div class="modal-content">
        <button class="close-modal" onclick="closeModal('settingsModal')">&times;</button>
        <h2 style="color: #8B6CFF; margin-bottom: 20px;">Settings</h2>
        <div class="settings-list">
            <div class="setting-row">
                <span>Music</span>
                <input type="checkbox" id="darkModeToggle">
            </div>
            <div class="setting-row">
                <span>Notifications</span>
                <input type="checkbox" checked>
            </div>
            <button class="auth-btn" style="margin-top: 20px;">Save Changes</button>
        </div>
    </div>
</div>

  <script src="../js/navbar.js"></script>
  <script>
    feather.replace();
  </script>
</body>
</html>
